<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Predicción de Aglomeración Metro Londres</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; color: #333; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; }
  .container { max-width: 800px; width: 100%; background: white; border-radius: 16px; padding: 32px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
  h1 { font-size: 24px; margin-bottom: 4px; color: #1a1a2e; }
  .subtitle { color: #666; font-size: 14px; margin-bottom: 24px; }
  .form-group { margin-bottom: 16px; }
  label { display: block; font-size: 13px; font-weight: 600; color: #444; margin-bottom: 4px; }
  select, input[type="text"] { width: 100%; padding: 10px 12px; border: 1.5px solid #d0d5dd; border-radius: 8px; font-size: 14px; background: white; }
  select:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
  .btn { width: 100%; padding: 12px; background: #2563eb; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px; }
  .btn:hover { background: #1d4ed8; }
  .btn:disabled { background: #93c5fd; cursor: not-allowed; }
  .btn-sm { padding: 8px 14px; font-size: 13px; font-weight: 600; width: auto; margin: 3px 4px 3px 0; background: #f3f4f6; color: #333; border: 1px solid #d0d5dd; border-radius: 6px; cursor: pointer; }
  .btn-sm:hover { background: #e5e7eb; }
  .btn-sm.primary { background: #2563eb; color: white; border-color: #2563eb; }
  .btn-sm.primary:hover { background: #1d4ed8; }
  .btn-sm.danger { color: #dc2626; border-color: #fca5a5; }
  .btn-sm.danger:hover { background: #fef2f2; }
  .btn-sm.star { font-size: 18px; padding: 4px 12px; min-width: 48px; }
  .btn-sm.star.active { background: #fef3c7; border-color: #f59e0b; color: #d97706; }
  .loading { text-align: center; padding: 20px; color: #666; display: none; }
  .spinner { border: 3px solid #e5e7eb; border-top: 3px solid #2563eb; border-radius: 50%; width: 24px; height: 24px; animation: spin 0.8s linear infinite; display: inline-block; margin-right: 8px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .result { margin-top: 16px; padding: 20px; border-radius: 12px; display: none; }
  .result.Bajo { background: #d1fae5; border: 1px solid #6ee7b7; }
  .result.Medio { background: #fef3c7; border: 1px solid #fcd34d; }
  .result.Alto { background: #fed7aa; border: 1px solid #fb923c; }
  .result.Saturado { background: #fecaca; border: 1px solid #f87171; }
  .result h2 { font-size: 18px; margin-bottom: 8px; }
  .result .stat { display: flex; justify-content: space-between; padding: 6px 0; font-size: 14px; border-bottom: 1px solid rgba(0,0,0,0.06); }
  .result .stat:last-child { border: none; }
  .result .stat .label { color: #555; }
  .result .stat .value { font-weight: 600; }
  .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: 700; }
  .badge.Bajo { background: #6ee7b7; color: #064e3b; }
  .badge.Medio { background: #fcd34d; color: #78350f; }
  .badge.Alto { background: #fb923c; color: #7c2d12; }
  .badge.Saturado { background: #f87171; color: #7f1d1d; }
  .error { margin-top: 16px; padding: 12px; background: #fef2f2; border: 1px solid #fca5a5; border-radius: 8px; color: #991b1b; font-size: 14px; display: none; }
  .search-loading { font-size: 13px; color: #888; padding: 4px 0; display: none; }
  .result-table { width:100%; border-collapse:collapse; margin-top:12px; font-size:13px; }
  .result-table th { background:#f9fafb; text-align:left; padding:8px 10px; border-bottom:2px solid #e5e7eb; font-weight:600; }
  .result-table td { padding:8px 10px; border-bottom:1px solid #e5e7eb; }
  .result-table tr:last-child td { border-bottom:none; }
  .result-table tr.least { background:#ecfdf5; font-weight:600; }
  .result-table tr.least td { border-bottom-color:#6ee7b7; }
  .star-icon { cursor:pointer; font-size:20px; user-select:none; }
  .favorites-section { margin-top:16px; padding:12px 16px; background:#f9fafb; border-radius:8px; border:1px solid #e5e7eb; }
  .favorites-section h4 { font-size:13px; color:#555; margin-bottom:8px; text-transform:uppercase; letter-spacing:0.5px; }
  .fav-tag { display:inline-flex; align-items:center; gap:4px; padding:5px 10px; background:white; border:1px solid #d0d5dd; border-radius:6px; font-size:13px; margin:3px; cursor:pointer; }
  .fav-tag:hover { border-color:#2563eb; }
  .fav-tag .del { color:#999; font-size:14px; margin-left:4px; cursor:pointer; }
  .fav-tag .del:hover { color:#dc2626; }
  .hour-display { font-size:32px; font-weight:700; color:#1a1a2e; text-align:center; margin:8px 0 4px; }
  .hour-display span.min { font-weight:400; color:#888; font-size:24px; }
  input[type="range"] { width:100%; margin:4px 0; accent-color:#2563eb; }
  .minute-btn { padding:6px 0; min-width:40px; font-size:12px; font-weight:600; border:1.5px solid #d0d5dd; border-radius:6px; background:white; color:#555; cursor:pointer; transition:all 0.15s; }
  .minute-btn:hover { border-color:#2563eb; color:#2563eb; }
  .minute-btn.active { background:#2563eb; border-color:#2563eb; color:white; }
  .footer { margin-top:28px; text-align:center; font-size:12px; color:#999; }
  .footer a { color:#2563eb; text-decoration:none; }
  @media (max-width:480px) { .container { padding:20px; } }
</style>
</head>
<body>
<div class="container">
  <h1>London prediction</h1>
  <p class="subtitle">Predicción de aglomeración en estaciones del Metro de Londres</p>

  <div class="form-group">
    <div style="display:flex;gap:8px;align-items:end;">
      <div style="flex:1;">
        <label for="station">Estación</label>
        <select id="station"><option value="">Cargando estaciones...</option></select>
        <div class="search-loading" id="station-loading">Cargando listado de estaciones...</div>
      </div>
      <button class="btn-sm star" id="fav-btn" onclick="toggleFav()" title="Guardar como favorita">☆</button>
    </div>
  </div>

  <div class="form-group">
    <label for="day">Día</label>
    <select id="day">
      <option value="MON">Lunes (MON)</option>
      <option value="TWT" selected>Martes–Jueves (TWT)</option>
      <option value="FRI">Viernes (FRI)</option>
      <option value="SAT">Sábado (SAT)</option>
      <option value="SUN">Domingo (SUN)</option>
    </select>
  </div>

  <div class="form-group">
    <label>Hora</label>
    <div class="hour-display" id="hour-display">12<span class="min">h</span></div>
    <input type="range" id="hour-slider" min="0" max="23" value="12" step="1">
    <div style="display:flex;justify-content:space-between;font-size:11px;color:#999;margin-top:2px;">
      <span>00h</span><span>06h</span><span>12h</span><span>18h</span><span>23h</span>
    </div>
    <div style="display:flex;gap:6px;justify-content:center;margin-top:8px;">
      <button class="minute-btn active" data-min="0" onclick="setMinute(0)">:00</button>
      <button class="minute-btn" data-min="15" onclick="setMinute(15)">:15</button>
      <button class="minute-btn" data-min="30" onclick="setMinute(30)">:30</button>
      <button class="minute-btn" data-min="45" onclick="setMinute(45)">:45</button>
    </div>
  </div>

  <div class="favorites-section" id="favorites-section" style="display:none;">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <h4>★ Tus favoritas</h4>
    </div>
    <div id="favorites-list"></div>
  </div>

  <button class="btn" id="predict-btn" disabled>Consultar aglomeración</button>

  <div class="loading" id="loading"><span class="spinner"></span> Calculando predicción...</div>
  <div class="error" id="error"></div>
  <div class="result" id="result"></div>

  <div class="api-playground" style="margin-top:28px;border-top:1px solid #e5e7eb;padding-top:20px;">
    <h3 style="font-size:15px;color:#1a1a2e;margin-bottom:12px;">Predecir múltiples estaciones</h3>
    <textarea id="post-body" style="width:100%;min-height:100px;padding:10px;border:1.5px solid #d0d5dd;border-radius:8px;font-family:'Courier New',monospace;font-size:12px;resize:vertical;">{
  "estaciones": [
    {"estacion": "Oxford Circus", "dia": "TWT", "hora": 8},
    {"estacion": "Waterloo", "dia": "FRI", "hora": 18}
  ]
}</textarea>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;">
      <button class="btn-sm primary" onclick="sendPostCrowding()">Predecir todas</button>
      <button class="btn-sm" onclick="document.getElementById('file-input').click()">Subir archivo .json</button>
      <input type="file" id="file-input" accept=".json" style="display:none" onchange="loadJsonFile(event)">
      <button class="btn-sm" onclick="document.getElementById('post-body').value=document.getElementById('post-body').defaultValue">Restaurar ejemplo</button>
    </div>
  </div>
</div>

<div class="footer">
  <a href="https://github.com/aJk15lml/Proyecto_productivizacion/tree/dev" target="_blank">GitHub</a>
</div>

<script>
const BASE = window.location.origin;
let stations = [];
let _minuto = 0;
let _favorites = JSON.parse(localStorage.getItem("favStations") || "[]");
const STORAGE_KEY = "favStations";

// ---- Slider hora ----
const slider = document.getElementById("hour-slider");
const disp = document.getElementById("hour-display");
slider.addEventListener("input", () => {
  disp.innerHTML = slider.value + '<span class="min">h</span>';
});

// ---- Minutos ----
function setMinute(m) {
  _minuto = m;
  document.querySelectorAll(".minute-btn").forEach(b =>
    b.classList.toggle("active", parseInt(b.dataset.min) === m));
}

// ---- Favoritos ----
function saveFavs() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(_favorites));
  renderFavs();
}

function toggleFav() {
  const nlc = document.getElementById("station").value;
  if (!nlc) return;
  const s = stations.find(st => st.NLC == nlc);
  if (!s) return;
  const idx = _favorites.findIndex(f => f.NLC == nlc);
  if (idx >= 0) { _favorites.splice(idx, 1); } else { _favorites.push({ NLC: nlc, nombre: s.nombre }); }
  saveFavs();
  updateFavBtn();
}

function updateFavBtn() {
  const nlc = document.getElementById("station").value;
  const btn = document.getElementById("fav-btn");
  const isFav = nlc && _favorites.some(f => f.NLC == nlc);
  btn.textContent = isFav ? "★" : "☆";
  btn.classList.toggle("active", isFav);
}

function renderFavs() {
  const section = document.getElementById("favorites-section");
  const list = document.getElementById("favorites-list");
  if (_favorites.length === 0) { section.style.display = "none"; return; }
  section.style.display = "block";
  list.innerHTML = _favorites.map(f =>
    `<span class="fav-tag" onclick="selectFav('${f.NLC}')">${f.nombre} <span class="del" onclick="event.stopPropagation();removeFav('${f.NLC}')">✕</span></span>`
  ).join("");
}

function selectFav(nlc) {
  document.getElementById("station").value = nlc;
  updateFavBtn();
}

function removeFav(nlc) {
  _favorites = _favorites.filter(f => f.NLC != nlc);
  saveFavs();
  updateFavBtn();
}

// ---- API ----
async function apiFetch(url) {
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 55000);
  const r = await fetch(BASE + url, { signal: controller.signal });
  clearTimeout(timeout);
  const ct = r.headers.get("content-type") || "";
  if (!ct.includes("application/json") && !ct.includes("text/json"))
    throw new Error("El servidor no responde (posible cold start).");
  return r.json();
}

// ---- Cargar estaciones ----
async function loadStations() {
  const sel = document.getElementById("station");
  const loadEl = document.getElementById("station-loading");
  loadEl.style.display = "block";
  try {
    const data = await apiFetch("/stations");
    stations = data.estaciones || [];
    sel.innerHTML = '<option value="">Selecciona una estación</option>';
    stations.sort((a, b) => (a.nombre || "").localeCompare(b.nombre || ""));
    stations.forEach(s => {
      const o = document.createElement("option");
      o.value = s.NLC; o.textContent = s.nombre + (s.zona ? " (zona " + s.zona + ")" : "");
      sel.appendChild(o);
    });
    document.getElementById("predict-btn").disabled = false;
    renderFavs();
  } catch (e) { sel.innerHTML = '<option value="">' + e.message + "</option>"; }
  loadEl.style.display = "none";
}

document.getElementById("station").addEventListener("change", updateFavBtn);

// ---- Predecir individual ----
document.getElementById("predict-btn").addEventListener("click", async () => {
  const nlc = document.getElementById("station").value;
  const dia = document.getElementById("day").value;
  const hora = slider.value;
  if (!nlc) { showError("Selecciona una estación"); return; }
  const stationName = stations.find(s => s.NLC == nlc)?.nombre || nlc;
  document.getElementById("loading").style.display = "block";
  document.getElementById("error").style.display = "none";
  document.getElementById("result").style.display = "none";
  try {
    const data = await apiFetch("/crowding?estacion=" + encodeURIComponent(stationName) + "&dia=" + dia + "&hora=" + hora);
    document.getElementById("loading").style.display = "none";
    if (data.error) { showError(data.error); return; }
    const nivel = data.nivel_aglomeracion || "Desconocido";
    const h = String(data.hora).padStart(2,"0");
    const m = String(_minuto).padStart(2,"0");
    const res = document.getElementById("result");
    res.className = "result " + nivel;
    res.style.display = "block";
    res.innerHTML = `
      <h2><span class="badge ${nivel}">${nivel}</span></h2>
      <div class="stat"><span class="label">Estación</span><span class="value">${data.estacion}</span></div>
      <div class="stat"><span class="label">Día</span><span class="value">${data.dia}</span></div>
      <div class="stat"><span class="label">Tramo</span><span class="value">${h}:${m} - ${h}:${String(_minuto+15).padStart(2,"0")} h</span></div>
      <div class="stat"><span class="label">Pasajeros estimados (15 min)</span><span class="value">${data.pasajeros_15min_estimados}</span></div>
      <div class="stat"><span class="label">NLC</span><span class="value">${data.NLC}</span></div>
      <div class="stat"><span class="label">Coordenadas</span><span class="value">${data.latitud?.toFixed(4)}, ${data.longitud?.toFixed(4)}</span></div>`;
  } catch (e) {
    document.getElementById("loading").style.display = "none";
    showError(e.message.includes("cold start")
      ? "El servidor está arrancando (cold start). Espera y pulsa \"Reintentar\"."
      : "Error: " + e.message);
  }
});

function showError(msg) {
  const el = document.getElementById("error");
  el.innerHTML = msg + ' <button onclick="document.getElementById(\'predict-btn\').click()" style="margin-left:8px;padding:4px 12px;border:1px solid #fca5a5;border-radius:6px;background:white;cursor:pointer;font-size:13px;">Reintentar</button>';
  el.style.display = "block";
}

// ---- Predecir multiples (POST con tabla + menos saturada) ----
async function sendPostCrowding() {
  let payload;
  try { payload = JSON.parse(document.getElementById("post-body").value); }
  catch (e) { alert("JSON inválido: " + e.message); return; }

  document.getElementById("loading").style.display = "block";
  document.getElementById("error").style.display = "none";
  document.getElementById("result").style.display = "none";
  try {
    const r = await fetch(BASE + "/crowding", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });
    const data = await r.json();
    document.getElementById("loading").style.display = "none";
    if (data.error) { showError(data.error); return; }

    const res = document.getElementById("result");
    res.style.display = "block";
    res.className = "result";

    const results = data.resultados || [];
    if (results.length === 0) { res.innerHTML = "<p>Sin resultados</p>"; return; }

    const levelRank = { "Bajo": 0, "Medio": 1, "Alto": 2, "Saturado": 3 };
    const sorted = [...results].sort((a, b) => {
      const ra = levelRank[a.nivel_aglomeracion] ?? 99;
      const rb = levelRank[b.nivel_aglomeracion] ?? 99;
      if (ra !== rb) return ra - rb;
      return (a.pasajeros_15min_estimados || 0) - (b.pasajeros_15min_estimados || 0);
    });
    const least = sorted[0];
    const leastIdx = results.indexOf(least);

    let html = '<h2>Resultados múltiples</h2>';
    html += `<p style="font-size:13px;color:#047857;margin:8px 0;padding:8px 12px;background:#ecfdf5;border-radius:6px;">
      🟢 Menos saturada: <strong>${least.estacion}</strong> — ${least.pasajeros_15min_estimados} pasajeros/15min (${least.nivel_aglomeracion})
    </p>`;
    html += '<table class="result-table"><tr><th>#</th><th>Estación</th><th>Día</th><th>Hora</th><th>Pasajeros</th><th>Nivel</th></tr>';
    results.forEach((r, i) => {
      const cls = i === leastIdx ? ' class="least"' : "";
      const lvl = r.nivel_aglomeracion || "";
      html += `<tr${cls}><td>${i+1}</td><td>${r.estacion}</td><td>${r.dia}</td><td>${r.hora}h</td><td>${r.pasajeros_15min_estimados}</td><td><span class="badge ${lvl}">${lvl}</span></td></tr>`;
    });
    html += "</table>";
    res.innerHTML = html;
  } catch (e) {
    document.getElementById("loading").style.display = "none";
    showError("Error: " + (e.message.includes("unexpected character")
      ? "El servidor no respondió con JSON (posible cold start). Reintenta."
      : e.message));
  }
}

// ---- File upload ----
function loadJsonFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    document.getElementById("post-body").value = e.target.result;
    sendPostCrowding();
  };
  reader.readAsText(file);
  event.target.value = "";
}

loadStations();
</script>
</body>
</html>
